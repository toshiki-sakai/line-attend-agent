name = "line-attend-agent"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Cron Triggers（毎分実行）
[triggers]
crons = ["* * * * *"]

# KV Namespace（テナント設定キャッシュ）
[[kv_namespaces]]
binding = "TENANT_CACHE"
id = "d1f26074ee4444d9b21e4a9bffa2bb58"

# Queue（非同期メッセージ処理）
[[queues.producers]]
queue = "line-events"
binding = "MESSAGE_QUEUE"

[[queues.consumers]]
queue = "line-events"
max_batch_size = 10
max_retries = 3
dead_letter_queue = "line-events-dlq"
